name = "chat"
description = "AI chat panel for Next.js. Requires an MCP server (moose add mcp-server)"
kind = "nextjs"
language = "typescript"
template = "typescript-mcp"
base_path = "packages/web-app"

docs = """
  1. Generate auth tokens:  moose generate hash-token
     Copy the Bearer Token into .env.local as MCP_API_TOKEN.
  2. Get your Anthropic API key from https://console.anthropic.com
     Copy it into .env.local as ANTHROPIC_API_KEY.
  3. Add ChatLayoutWrapper to your layout or page:
       import { ChatLayoutWrapper } from "@/components/layout/chat-layout-wrapper";
       <ChatLayoutWrapper>{children}</ChatLayoutWrapper>
  4. Start both moose and web apps
"""

npm_deps = [
  "ai@5.0.106",
  "@ai-sdk/anthropic@2.0.53",
  "@ai-sdk/mcp@0.0.7",
  "@ai-sdk/react@2.0.106",
  "react-markdown@^10.1.0",
  "remark-gfm@^4.0.1",
  "react-resizable-panels@^3.0.6",
  "lucide-react@^0.552.0",
  "class-variance-authority@^0.7.1",
  "next-themes@^0.2.1",
]

shadcn_components = ["badge", "button", "collapsible", "dropdown-menu", "scroll-area", "textarea"]
moose_exports = []

