language = "Typescript"

[typescript_config]
# Package manager to use for installing dependencies
# Options: "npm" (default), "pnpm", "yarn"
package_manager = "npm"

[redpanda_config]
broker = "localhost:19092"
message_timeout_ms = 1000
retention_ms = 30000
replication_factor = 1

[clickhouse_config]
db_name = "local"
user = "panda"
password = "pandapass"
use_ssl = false
host = "localhost"
host_port = 18123
native_port = 9000
# additional_databases = ["analytics", "staging"]  # Optional: Additional databases to create on startup

[http_server_config]
host = "localhost"
port = 4000
management_port = 5001

[redis_config]
url = "redis://127.0.0.1:6379"
key_prefix = "MS"

[git_config]
main_branch_name = "main"

[temporal_config]
db_user = "temporal"
db_password = "temporal"
db_port = 5432
temporal_port = 7233
temporal_version = "1.22.3"
admin_tools_version = "1.22.3"
ui_version = "2.21.3"
ui_port = 8080
ui_cors_origins = "http://localhost:3000"
config_path = "config/dynamicconfig/development-sql.yaml"
postgresql_version = "13"

[supported_old_versions]

[watcher_config]
# IMPORTANT: Ignore the migration subdirectory to prevent the outer app from
# reacting to file changes in the inner app, which could cause table drops.
ignore_patterns = ["migration/**"]

[features]
streaming_engine = false
workflows = false
apis = false
ddl_plan = false
olap = true

# IMPORTANT: This template is for testing serverless migration flow
# State is stored in ClickHouse instead of Redis
[state_config]
storage = "clickhouse"

