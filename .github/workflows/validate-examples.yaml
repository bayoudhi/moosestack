name: Validate Examples

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["Release CLI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  discover:
    name: Discover examples
    runs-on: ubuntu-latest
    # Skip if triggered by a failed release
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      examples: ${{ steps.find.outputs.examples }}
      should_run: ${{ steps.check-changes.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check-changes
        name: Check for example changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            # Check if any examples/** files changed
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q '^examples/'; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "No changes in examples/, skipping validation"
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
          fi
      - id: find
        name: Find buildable examples
        if: steps.check-changes.outputs.should_run == 'true'
        run: |
          # Find directories in examples/ that contain buildable indicators
          # at any depth up to 3 levels (handles monorepo examples like brainwaves/apps/brainmoose/*)
          examples=$(find examples -mindepth 1 -maxdepth 1 -type d | while read dir; do
            name=$(basename "$dir")
            if find "$dir" -maxdepth 3 \( -name package.json -o -name requirements.txt -o -name moose.config.toml -o -name setup.py -o -name pnpm-workspace.yaml \) -print -quit | grep -q .; then
              echo "$name"
            fi
          done | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "examples=$examples" >> "$GITHUB_OUTPUT"
          echo "Found examples: $examples"

  validate:
    name: Validate ${{ matrix.example }}
    needs: discover
    if: ${{ needs.discover.outputs.should_run == 'true' && needs.discover.outputs.examples != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.discover.outputs.examples || '[]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Find project roots
        id: roots
        working-directory: examples/${{ matrix.example }}
        run: |
          # Collect directories that contain a buildable manifest.
          # Start with the example root itself, then fall back to subdirectories.
          roots=""
          if [ -f "package.json" ] || [ -f "pnpm-workspace.yaml" ] || [ -f "pnpm-lock.yaml" ] || [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "moose.config.toml" ]; then
            roots="."
          else
            # Monorepo-style example: find subdirectories with manifests (up to 3 levels)
            roots=$(find . -mindepth 1 -maxdepth 3 \( -name package.json -o -name requirements.txt -o -name setup.py -o -name pnpm-workspace.yaml -o -name moose.config.toml \) -exec dirname {} \; | sort -u)
          fi
          if [ -z "$roots" ]; then
            echo "::error::No manifest found for ${{ matrix.example }} at any depth — nothing to validate"
            exit 1
          fi
          echo "roots<<EOF" >> "$GITHUB_OUTPUT"
          echo "$roots" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Project roots: $roots"

      - name: Install dependencies
        working-directory: examples/${{ matrix.example }}
        run: |
          while IFS= read -r root; do
            [ -z "$root" ] && continue
            echo "::group::Install deps in $root"
            pushd "$root" > /dev/null
            if [ -f "pnpm-lock.yaml" ]; then
              corepack enable
              pnpm install --frozen-lockfile
            elif [ -f "pnpm-workspace.yaml" ]; then
              corepack enable
              pnpm install
            elif [ -f "package-lock.json" ]; then
              npm ci
            elif [ -f "package.json" ]; then
              npm install
            fi
            if [ -f "requirements.txt" ]; then
              pip install -r requirements.txt
            fi
            if [ -f "setup.py" ]; then
              pip install -e .
            fi
            popd > /dev/null
            echo "::endgroup::"
          done <<< "${{ steps.roots.outputs.roots }}"

      # Note: ideally we'd run `moose build` here per the design spec,
      # but that requires ClickHouse and other infrastructure.
      # For now we validate that deps install and code compiles.
      - name: Build / typecheck
        working-directory: examples/${{ matrix.example }}
        run: |
          validated=false
          while IFS= read -r root; do
            [ -z "$root" ] && continue
            echo "::group::Validate $root"
            pushd "$root" > /dev/null
            if [ -f "pnpm-workspace.yaml" ] || [ -f "pnpm-lock.yaml" ]; then
              # Discover packages whose build requires moose-cli infrastructure (Docker/ClickHouse)
              # and exclude them. Everything else is built and validated normally.
              skip_filters=""
              for pkg_json in $(find . -name package.json -maxdepth 3 -not -path '*/node_modules/*'); do
                build_cmd=$(node -e "try{const p=require('./$pkg_json');console.log(p.scripts?.build||'')}catch(e){}" 2>/dev/null)
                if echo "$build_cmd" | grep -q "moose-cli"; then
                  pkg_name=$(node -e "const p=require('./$pkg_json');console.log(p.name)" 2>/dev/null)
                  echo "::warning::Skipping build for $pkg_name (requires moose-cli infrastructure)"
                  skip_filters="$skip_filters --filter=!${pkg_name}"
                fi
              done
              # Build and typecheck remaining packages in dependency order
              pnpm -r --include-workspace-root ${skip_filters} run --if-present build
              pnpm -r --include-workspace-root ${skip_filters} run --if-present typecheck
              validated=true
            elif [ -f "package.json" ]; then
              ran_any=false
              if node -e "const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)" 2>/dev/null; then
                npm run build
                ran_any=true
              fi
              if node -e "const p=require('./package.json'); process.exit(p.scripts?.typecheck ? 0 : 1)" 2>/dev/null; then
                npm run typecheck
                ran_any=true
              fi
              if [ "$ran_any" = false ]; then
                echo "No build/typecheck script found, deps install verified"
              fi
              validated=true
            fi
            if [ -f "requirements.txt" ] || [ -f "setup.py" ]; then
              if python -m pip show moose-lib >/dev/null 2>&1; then
                python -c "import moose_lib; print('moose_lib imported successfully')"
              fi
              validated=true
            fi
            if [ "$validated" = false ] && [ -f "moose.config.toml" ]; then
              echo "::warning::moose.config.toml found but no buildable manifest — requires moose-cli infrastructure, skipping build"
              validated=true
            fi
            popd > /dev/null
            echo "::endgroup::"
          done <<< "${{ steps.roots.outputs.roots }}"
          if [ "$validated" = false ]; then
            echo "::error::No manifest validated for ${{ matrix.example }} — nothing was validated"
            exit 1
          fi

  # Final status check that depends on all jobs
  validate-examples-status:
    runs-on: ubuntu-latest
    needs: [discover, validate]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check final status
        shell: bash
        run: |
          if [[ "${{ needs.discover.result }}" == "failure" ]]; then
            echo "Discover job failed"
            exit 1
          fi

          if [[ "${{ needs.discover.outputs.should_run }}" != "true" ]]; then
            echo "No example changes detected, marking as success"
            exit 0
          fi

          if [[ "${{ needs.validate.result }}" == "failure" ]]; then
            echo "One or more example validations failed"
            exit 1
          fi

          if [[ "${{ needs.validate.result }}" == "success" ]] || [[ "${{ needs.validate.result }}" == "skipped" ]]; then
            echo "All example validations passed"
            exit 0
          fi

          echo "Unexpected state in dependent jobs"
          exit 1
