version: 2
updates:
  # Rust toolchain version (rust-toolchain.toml)
  # This replaces the custom rust-update.yaml workflow
  - package-ecosystem: "rust-toolchain"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    labels:
      - "rust"
      - "toolchain"

  # =============================================================================
  # Templates - Monitor all dependencies using glob patterns
  # =============================================================================

  # TypeScript templates (any package.json in templates/)
  - package-ecosystem: "npm"
    directories:
      - "/templates/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "typescript"
      - "templates"
      - "dependencies"
    groups:
      moose:
        patterns:
          - "@514labs/moose-cli"
          - "@514labs/moose-lib"
    ignore:
      # Keep @types/node at 20.x.x for backward compatibility
      # Node.js 20 is LTS and we want to ensure compatibility
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Python templates (any requirements.txt in templates/)
  - package-ecosystem: "pip"
    directories:
      - "/templates/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "python"
      - "templates"
      - "dependencies"
    groups:
      moose:
        patterns:
          - "moose-cli"
          - "moose-lib"

  # =============================================================================
  # Examples - Monitor dependencies (these manage their own versions)
  # =============================================================================

  # TypeScript examples (any package.json in examples/)
  - package-ecosystem: "npm"
    directories:
      - "/examples/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "typescript"
      - "examples"
      - "dependencies"
    groups:
      moose:
        patterns:
          - "@514labs/moose-cli"
          - "@514labs/moose-lib"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # Python examples (any requirements.txt in examples/)
  - package-ecosystem: "pip"
    directories:
      - "/examples/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "python"
      - "examples"
      - "dependencies"
    groups:
      moose:
        patterns:
          - "moose-cli"
          - "moose-lib"
